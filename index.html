<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ResponsiView Pro — All Devices Responsive Checker</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080810;
  --s1: #0f0f1a;
  --s2: #161624;
  --s3: #1e1e30;
  --border: #252538;
  --border2: #2e2e48;
  --text: #e2e2f0;
  --muted: #4a4a6a;
  --dim: #6a6a8a;
  --apple: #0af;
  --android: #3ddc84;
  --windows: #00bcf2;
  --samsung: #1428a0;
  --samsung-l: #4a9eff;
  --tv: #ff6b35;
  --watch: #bf5af2;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Outfit', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── TOPBAR ── */
.topbar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 20px;
  background: var(--s1);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  z-index: 100;
}
.logo {
  font-size: 15px;
  font-weight: 800;
  letter-spacing: -0.5px;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 7px;
}
.logo-icon {
  width: 28px; height: 28px;
  background: linear-gradient(135deg, #0af 0%, #bf5af2 100%);
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
}
.logo span { color: #0af; }

.url-form {
  flex: 1;
  display: flex;
  gap: 8px;
  max-width: 580px;
}
input[type=text] {
  flex: 1;
  background: var(--s2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 14px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 12px;
  outline: none;
  transition: border-color .2s;
}
input[type=text]:focus { border-color: #0af; }
input[type=text]::placeholder { color: var(--muted); }

.load-btn {
  background: #0af;
  color: #000;
  border: none;
  border-radius: 8px;
  padding: 8px 20px;
  font-family: var(--sans);
  font-weight: 700;
  font-size: 13px;
  cursor: pointer;
  transition: all .2s;
  white-space: nowrap;
  letter-spacing: 0.3px;
}
.load-btn:hover { background: #00aaee; transform: translateY(-1px); }
.load-btn:active { transform: scale(.97); }

/* ── LAYOUT ── */
.layout {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* ── SIDEBAR ── */
.sidebar {
  width: 220px;
  flex-shrink: 0;
  background: var(--s1);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 12px 0;
}
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.cat-group { margin-bottom: 4px; }
.cat-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.8px;
  text-transform: uppercase;
  color: var(--muted);
  cursor: pointer;
  user-select: none;
  transition: color .2s;
}
.cat-header:hover { color: var(--text); }
.cat-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.cat-arrow { margin-left: auto; font-size: 9px; transition: transform .2s; }
.cat-group.open .cat-arrow { transform: rotate(90deg); }

.cat-devices { display: none; }
.cat-group.open .cat-devices { display: block; }

.device-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 14px 6px 28px;
  font-size: 12px;
  color: var(--dim);
  cursor: pointer;
  transition: all .15s;
  border-left: 2px solid transparent;
}
.device-item:hover { color: var(--text); background: var(--s2); }
.device-item.active { color: var(--text); background: var(--s2); border-left-color: #0af; }
.device-item .d-name { flex: 1; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.device-item .d-size { font-family: var(--mono); font-size: 9px; color: var(--muted); }

.sidebar-all {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  font-size: 12px;
  font-weight: 600;
  color: var(--dim);
  cursor: pointer;
  transition: all .15s;
  border-left: 2px solid transparent;
  margin-bottom: 8px;
}
.sidebar-all:hover { color: var(--text); background: var(--s2); }
.sidebar-all.active { color: #0af; background: rgba(0,170,255,.06); border-left-color: #0af; }

/* ── MAIN CANVAS ── */
.main {
  flex: 1;
  overflow: auto;
  padding: 20px;
  background: var(--bg);
}
.main::-webkit-scrollbar { width: 6px; height: 6px; }
.main::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* ── CATEGORY VIEW ── */
.cat-section { margin-bottom: 36px; animation: fadeUp .3s ease; }
.cat-section-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}
.cat-section-icon {
  width: 32px; height: 32px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}
.cat-section-title { font-size: 16px; font-weight: 700; }
.cat-section-count { font-size: 11px; color: var(--muted); font-family: var(--mono); margin-left: auto; }

.devices-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 14px;
}

/* ── DEVICE CARD ── */
.device-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  padding: 12px 8px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--s1);
  transition: all .2s;
}
.device-card:hover {
  border-color: var(--border2);
  background: var(--s2);
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(0,0,0,.4);
}
.device-card.selected {
  border-color: #0af;
  background: rgba(0,170,255,.05);
}

.device-name { font-size: 11px; font-weight: 600; text-align: center; color: var(--text); }
.device-res {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--muted);
  background: var(--s3);
  padding: 2px 7px;
  border-radius: 20px;
}

/* ── SINGLE DEVICE VIEW ── */
.single-view {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  animation: fadeUp .3s ease;
  min-height: 100%;
  justify-content: flex-start;
  padding-bottom: 40px;
}
.single-header {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 16px;
  align-self: stretch;
  max-width: 700px;
  width: 100%;
}
.single-header .back-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--dim);
  border-radius: 6px;
  padding: 5px 10px;
  font-size: 12px;
  cursor: pointer;
  font-family: var(--sans);
  transition: all .15s;
}
.single-header .back-btn:hover { color: var(--text); border-color: var(--border2); }
.single-name { font-size: 15px; font-weight: 700; }
.single-meta { font-family: var(--mono); font-size: 11px; color: var(--muted); }
.single-controls { display: flex; align-items: center; gap: 8px; margin-left: auto; }
.z-btn {
  width: 28px; height: 28px;
  background: var(--s2);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 6px;
  cursor: pointer;
  font-size: 15px;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.z-btn:hover { border-color: #0af; color: #0af; }
.z-val { font-family: var(--mono); font-size: 12px; color: var(--dim); min-width: 38px; text-align: center; }
.rot-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--dim);
  border-radius: 6px;
  padding: 5px 12px;
  font-size: 11px;
  cursor: pointer;
  font-family: var(--mono);
  transition: all .15s;
}
.rot-btn:hover { border-color: var(--watch); color: var(--watch); }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── DEVICE FRAME PIECES ── */
.frame-outer { position: relative; }

/* Screen / iframe container */
.screen {
  overflow: hidden;
  background: #fff;
  position: relative;
  flex-shrink: 0;
}
.screen iframe {
  border: none;
  display: block;
  transform-origin: top left;
  pointer-events: none;
}
.screen.interactive iframe { pointer-events: auto; }
.empty-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  background: var(--s2);
  color: var(--muted);
  font-family: var(--mono);
  font-size: 9px;
  letter-spacing: 1px;
  text-align: center;
  padding: 8px;
}
.empty-screen .e-ico { font-size: 22px; opacity: .3; }
.loading-overlay {
  position: absolute;
  inset: 0;
  background: var(--s2);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 10;
}
.spin {
  width: 20px; height: 20px;
  border: 2px solid var(--border2);
  border-top-color: #0af;
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── PHONE FRAME ── */
.phone-frame {
  background: var(--s2);
  border: 2px solid var(--border2);
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.phone-notch {
  background: var(--s1);
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
}
.phone-island {
  background: var(--s1);
  position: absolute;
  top: 8px;
  left: 50%;
  transform: translateX(-50%);
  border-radius: 20px;
}
.phone-chin { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); background: var(--border2); border-radius: 3px; }
.phone-side { background: var(--border2); border-radius: 2px; position: absolute; }
.phone-speaker {
  position: absolute;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--border2);
  border-radius: 3px;
}

/* ── TABLET FRAME ── */
.tablet-frame {
  background: var(--s2);
  border: 2.5px solid var(--border2);
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.tablet-cam {
  background: var(--border2);
  border-radius: 50%;
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
}
.tablet-home-bar { position: absolute; background: var(--border2); border-radius: 3px; left: 50%; transform: translateX(-50%); }

/* ── LAPTOP FRAME ── */
.laptop-outer { display: flex; flex-direction: column; align-items: center; }
.laptop-lid {
  background: var(--s2);
  border: 1.5px solid var(--border2);
  border-radius: 10px 10px 0 0;
  position: relative;
}
.laptop-topbar {
  background: var(--s1);
  border-radius: 9px 9px 0 0;
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 0 8px;
  border-bottom: 1px solid var(--border);
}
.dot { border-radius: 50%; flex-shrink: 0; }
.dr { background: #ff5f57; }
.dy { background: #febc2e; }
.dg { background: #28c840; }
.addr {
  flex: 1;
  background: var(--s2);
  border-radius: 3px;
  display: flex;
  align-items: center;
  padding: 0 5px;
  font-family: var(--mono);
  color: var(--muted);
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
  margin: 0 4px;
}
.laptop-base {
  background: var(--s2);
  border: 1.5px solid var(--border2);
  border-top: none;
  border-radius: 0 0 6px 6px;
  position: relative;
}
.trackpad {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: 3px;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

/* ── MONITOR FRAME ── */
.monitor-outer { display: flex; flex-direction: column; align-items: center; }
.monitor-shell {
  background: var(--s2);
  border: 2px solid var(--border2);
  border-radius: 10px 10px 0 0;
}
.monitor-bar {
  background: var(--s1);
  border-radius: 9px 9px 0 0;
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 0 8px;
  border-bottom: 1px solid var(--border);
}
.monitor-stand {
  background: var(--s2);
  border: 2px solid var(--border2);
  border-top: none;
  margin: 0 auto;
  border-radius: 0 0 4px 4px;
}
.monitor-foot {
  background: var(--s2);
  border: 2px solid var(--border2);
  border-radius: 4px;
  margin: 0 auto;
}

/* ── WATCH FRAME ── */
.watch-frame {
  background: var(--s2);
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.watch-crown {
  background: var(--border2);
  border-radius: 3px;
  position: absolute;
  right: -4px;
  top: 30%;
}
.watch-btn {
  background: var(--border2);
  border-radius: 2px;
  position: absolute;
  right: -4px;
  top: 55%;
}
.watch-band-top {
  background: var(--s3);
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  bottom: 100%;
  border-radius: 4px 4px 0 0;
}
.watch-band-bot {
  background: var(--s3);
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  top: 100%;
  border-radius: 0 0 4px 4px;
}

/* ── TV FRAME ── */
.tv-outer { display: flex; flex-direction: column; align-items: center; }
.tv-shell {
  background: var(--s2);
  border: 3px solid var(--border2);
  border-radius: 10px;
  padding: 8px;
  position: relative;
}
.tv-stand-neck {
  background: var(--s2);
  border: 2px solid var(--border2);
  border-top: none;
  margin: 0 auto;
}
.tv-stand-foot {
  background: var(--s2);
  border: 2px solid var(--border2);
  border-radius: 4px;
  margin: 0 auto;
}

/* ── STATUS BAR ── */
.statusbar {
  padding: 6px 20px;
  background: var(--s1);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 14px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
  flex-shrink: 0;
}
.s-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); }
.s-dot.live { background: var(--android); box-shadow: 0 0 6px var(--android); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.s-badge {
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 9px;
  letter-spacing: .5px;
}

/* Category colors */
.c-apple   { background: rgba(0,170,255,.12); border: 1px solid rgba(0,170,255,.3); color: #0af; }
.c-android { background: rgba(61,220,132,.1); border: 1px solid rgba(61,220,132,.3); color: var(--android); }
.c-windows { background: rgba(0,188,242,.1); border: 1px solid rgba(0,188,242,.3); color: var(--windows); }
.c-samsung { background: rgba(74,158,255,.1); border: 1px solid rgba(74,158,255,.3); color: var(--samsung-l); }
.c-tv      { background: rgba(255,107,53,.1); border: 1px solid rgba(255,107,53,.3); color: var(--tv); }
.c-watch   { background: rgba(191,90,242,.1); border: 1px solid rgba(191,90,242,.3); color: var(--watch); }

.dot-apple   { background: #0af; }
.dot-android { background: var(--android); }
.dot-windows { background: var(--windows); }
.dot-samsung { background: var(--samsung-l); }
.dot-tv      { background: var(--tv); }
.dot-watch   { background: var(--watch); }

.bg-apple   { background: rgba(0,170,255,.1); }
.bg-android { background: rgba(61,220,132,.08); }
.bg-windows { background: rgba(0,188,242,.08); }
.bg-samsung { background: rgba(74,158,255,.08); }
.bg-tv      { background: rgba(255,107,53,.08); }
.bg-watch   { background: rgba(191,90,242,.08); }
</style>
</head>

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
var state = {
  url: '',
  loaded: false,
  view: 'all',      // 'all' | 'category:id' | 'device:catId:devIdx'
  zoom: 70,
  rotated: false,
  activeCat: null,
  activeDevice: null,
};

// ═══════════════════════════════════════════════
// URL LOADING
// ═══════════════════════════════════════════════
function loadURL() {
  var v = document.getElementById('urlInput').value.trim();
  if (!v) return;
  if (!v.startsWith('http')) v = 'https://' + v;
  document.getElementById('urlInput').value = v;
  state.url = v;
  state.loaded = true;
  setStatus('live', 'Loaded: ' + v);
  renderMain();
}
document.getElementById('urlInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') loadURL();
});

function setStatus(s, msg) {
  document.getElementById('sDot').className = 's-dot' + (s === 'live' ? ' live' : '');
  document.getElementById('sText').textContent = msg;
}

// ═══════════════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════════════
function buildSidebar() {
  var sb = document.getElementById('sidebar');
  var html = '';

  html += '<div class="sidebar-all ' + (state.view === 'all' ? 'active' : '') + '" onclick="goAll()">⊞ &nbsp;All Devices Overview</div>';

  CATEGORIES.forEach(function(cat) {
    var isOpen = state.activeCat === cat.id;
    html += '<div class="cat-group ' + (isOpen ? 'open' : '') + '" id="cg-' + cat.id + '">';
    html += '<div class="cat-header" onclick="toggleCat(\'' + cat.id + '\')">'
      + '<span class="cat-dot dot-' + cat.color + '"></span>'
      + cat.label
      + '<span class="cat-arrow">▶</span></div>';
    html += '<div class="cat-devices">';
    cat.devices.forEach(function(d, i) {
      var isActive = state.view === 'device:' + cat.id + ':' + i;
      html += '<div class="device-item ' + (isActive ? 'active' : '') + '" onclick="openDevice(\'' + cat.id + '\',' + i + ')">'
        + '<span class="d-name">' + d.name + '</span>'
        + '<span class="d-size">' + d.w + '</span></div>';
    });
    html += '</div></div>';
  });

  sb.innerHTML = html;
}

function toggleCat(catId) {
  state.activeCat = state.activeCat === catId ? null : catId;
  if (state.activeCat) {
    state.view = 'category:' + catId;
    renderMain();
  }
  buildSidebar();
}

function goAll() {
  state.view = 'all';
  state.activeCat = null;
  state.activeDevice = null;
  buildSidebar();
  renderMain();
}

function openDevice(catId, devIdx) {
  state.view = 'device:' + catId + ':' + devIdx;
  state.activeCat = catId;
  state.activeDevice = devIdx;
  state.zoom = 70;
  state.rotated = false;
  buildSidebar();
  renderMain();
}

// ═══════════════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════════════
function renderMain() {
  var main = document.getElementById('main');
  main.innerHTML = '';

  if (state.view === 'all') {
    renderAllCategories(main);
  } else if (state.view.startsWith('category:')) {
    var catId = state.view.split(':')[1];
    renderCategory(main, catId);
  } else if (state.view.startsWith('device:')) {
    var parts = state.view.split(':');
    renderSingleDevice(main, parts[1], parseInt(parts[2]));
  }
}

// ── ALL CATEGORIES ──
function renderAllCategories(main) {
  CATEGORIES.forEach(function(cat) {
    var section = document.createElement('div');
    section.className = 'cat-section';

    section.innerHTML = '<div class="cat-section-header">'
      + '<div class="cat-section-icon bg-' + cat.color + '">' + cat.icon + '</div>'
      + '<span class="cat-section-title">' + cat.label + '</span>'
      + '<span class="cat-section-count s-badge c-' + cat.color + '">' + cat.devices.length + ' devices</span>'
      + '</div>';

    var grid = document.createElement('div');
    grid.className = 'devices-grid';

    cat.devices.forEach(function(d, i) {
      var card = document.createElement('div');
      card.className = 'device-card';
      var devType = d.type || cat.type;
      card.innerHTML = frameThumb(d, devType, cat.color)
        + '<div class="device-name">' + d.name + '</div>'
        + '<div class="device-res">' + d.w + ' × ' + d.h + '</div>';
      card.onclick = function() { openDevice(cat.id, i); };
      grid.appendChild(card);
    });

    section.appendChild(grid);
    main.appendChild(section);
  });
}

// ── SINGLE CATEGORY ──
function renderCategory(main, catId) {
  var cat = CATEGORIES.find(function(c){ return c.id === catId; });
  if (!cat) return;

  var section = document.createElement('div');
  section.className = 'cat-section';
  section.innerHTML = '<div class="cat-section-header">'
    + '<div class="cat-section-icon bg-' + cat.color + '">' + cat.icon + '</div>'
    + '<span class="cat-section-title">' + cat.label + '</span>'
    + '<span class="cat-section-count s-badge c-' + cat.color + '">' + cat.devices.length + ' devices</span>'
    + '</div>';

  var grid = document.createElement('div');
  grid.className = 'devices-grid';
  grid.style.gridTemplateColumns = 'repeat(auto-fill, minmax(140px, 1fr))';

  cat.devices.forEach(function(d, i) {
    var card = document.createElement('div');
    card.className = 'device-card';
    var devType = d.type || cat.type;
    card.innerHTML = frameThumb(d, devType, cat.color)
      + '<div class="device-name">' + d.name + '</div>'
      + '<div class="device-res">' + d.w + ' × ' + d.h + '</div>';
    card.onclick = function() { openDevice(cat.id, i); };
    grid.appendChild(card);
  });

  section.appendChild(grid);
  main.appendChild(section);
}

// ── SINGLE DEVICE ──
function renderSingleDevice(main, catId, devIdx) {
  var cat = CATEGORIES.find(function(c){ return c.id === catId; });
  if (!cat) return;
  var d = cat.devices[devIdx];
  if (!d) return;

  var devType = d.type || cat.type;
  var w = state.rotated ? d.h : d.w;
  var h = state.rotated ? d.w : d.h;
  var sc = state.zoom / 100;

  document.getElementById('sDevice').textContent = d.name + ' — ' + w + ' × ' + h + 'px';

  var wrap = document.createElement('div');
  wrap.className = 'single-view';

  // Header controls
  var header = document.createElement('div');
  header.className = 'single-header';

  var canRotate = devType !== 'monitor' && devType !== 'tv';
  header.innerHTML = '<button class="back-btn" onclick="goAll()">← All</button>'
    + '<div style="display:flex;flex-direction:column;gap:2px">'
    + '<div class="single-name">' + d.name + '</div>'
    + '<div class="single-meta">' + w + ' × ' + h + ' px &nbsp;·&nbsp; ' + cat.label + '</div></div>'
    + '<div class="single-controls">'
    + '<button class="z-btn" onclick="adjZoom(-10)">−</button>'
    + '<span class="z-val" id="zv">' + state.zoom + '%</span>'
    + '<button class="z-btn" onclick="adjZoom(10)">+</button>'
    + (canRotate ? '<button class="rot-btn" onclick="doRot()">⟳ Rotate</button>' : '')
    + '</div>';

  wrap.appendChild(header);

  // Device frame
  var frame = buildFrame(d, devType, w, h, sc, true);
  wrap.appendChild(frame);
  main.appendChild(wrap);
}

function adjZoom(d) {
  state.zoom = Math.max(25, Math.min(100, state.zoom + d));
  var zv = document.getElementById('zv');
  if (zv) zv.textContent = state.zoom + '%';
  renderMain();
}

function doRot() {
  state.rotated = !state.rotated;
  renderMain();
}

// ═══════════════════════════════════════════════
// FRAME THUMBNAIL (for grid cards, no iframe)
// ═══════════════════════════════════════════════
function frameThumb(d, type, color) {
  var thumbW, thumbH;
  if (type === 'phone' || type === 'watch') { thumbW = 44; thumbH = 80; }
  else if (type === 'tablet') { thumbW = 70; thumbH = 90; }
  else if (type === 'laptop') { thumbW = 100; thumbH = 66; }
  else if (type === 'monitor') { thumbW = 110; thumbH = 72; }
  else if (type === 'tv') { thumbW = 120; thumbH = 76; }
  else { thumbW = 70; thumbH = 50; }

  // aspect ratio
  var aspect = d.w / d.h;
  if (type === 'phone') {
    thumbW = Math.round(thumbH * aspect);
    if (thumbW > 50) { thumbW = 50; thumbH = Math.round(50 / aspect); }
  } else if (type === 'tablet') {
    if (aspect > 1) { thumbH = 60; thumbW = Math.round(60 * aspect); }
    else { thumbW = 60; thumbH = Math.round(60 / aspect); }
  }

  if (type === 'watch') return thumbWatch(thumbW, thumbH, color);
  if (type === 'phone') return thumbPhone(thumbW, thumbH, color, d);
  if (type === 'tablet') return thumbTablet(thumbW, thumbH, color);
  if (type === 'laptop') return thumbLaptop(thumbW, thumbH, color);
  if (type === 'monitor') return thumbMonitor(thumbW, thumbH, color);
  if (type === 'tv') return thumbTV(thumbW, thumbH, color);
  return '';
}

function thumbPhone(w, h, color, d) {
  var notchType = d.w >= 393 ? 'island' : 'notch';
  var br = Math.max(6, Math.round(w * 0.18));
  var screenW = w - 6; var screenH = h - 16;
  var islandW = Math.round(w * 0.35); var islandH = 5;
  var notchW = Math.round(w * 0.45); var notchH = 6;
  return '<div style="width:'+w+'px;height:'+h+'px;background:var(--s3);border:1.5px solid var(--border2);border-radius:'+br+'px;position:relative;display:flex;align-items:center;justify-content:center;margin:0 auto 4px;flex-shrink:0;">'
    + (notchType==='island'
        ? '<div style="width:'+islandW+'px;height:'+islandH+'px;background:var(--s1);border-radius:3px;position:absolute;top:5px;left:50%;transform:translateX(-50%);"></div>'
        : '<div style="width:'+notchW+'px;height:'+notchH+'px;background:var(--s1);border-radius:0 0 4px 4px;position:absolute;top:0;left:50%;transform:translateX(-50%);"></div>')
    + '<div style="width:'+screenW+'px;height:'+screenH+'px;background:#1a1a2e;border-radius:'+(br-2)+'px;overflow:hidden;display:flex;align-items:center;justify-content:center;">'
    + '<div style="font-size:7px;color:var(--muted);font-family:var(--mono);">'+d.w+'×'+d.h+'</div>'
    + '</div>'
    + '<div style="width:'+Math.round(w*0.35)+'px;height:3px;background:var(--border2);border-radius:2px;position:absolute;bottom:5px;left:50%;transform:translateX(-50%);"></div>'
    + '</div>';
}

function thumbTablet(w, h, color) {
  var br = 8; var pad = 6;
  return '<div style="width:'+w+'px;height:'+h+'px;background:var(--s3);border:1.5px solid var(--border2);border-radius:'+br+'px;position:relative;display:flex;align-items:center;justify-content:center;margin:0 auto 4px;flex-shrink:0;">'
    + '<div style="width:5px;height:5px;background:var(--border2);border-radius:50%;position:absolute;top:4px;left:50%;transform:translateX(-50%);"></div>'
    + '<div style="width:'+(w-12)+'px;height:'+(h-16)+'px;background:#1a1a2e;border-radius:4px;"></div>'
    + '</div>';
}

function thumbLaptop(w, h, color) {
  var lidH = Math.round(h * 0.72); var baseH = h - lidH;
  return '<div style="display:flex;flex-direction:column;margin:0 auto 4px;">'
    + '<div style="width:'+w+'px;height:'+lidH+'px;background:var(--s3);border:1.5px solid var(--border2);border-radius:5px 5px 0 0;overflow:hidden;">'
    + '<div style="width:100%;height:10px;background:var(--s1);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:3px;padding:0 5px;">'
    + '<div style="width:5px;height:5px;border-radius:50%;background:#ff5f57;"></div>'
    + '<div style="width:5px;height:5px;border-radius:50%;background:#febc2e;"></div>'
    + '<div style="width:5px;height:5px;border-radius:50%;background:#28c840;"></div>'
    + '</div>'
    + '<div style="flex:1;background:#1a1a2e;height:'+(lidH-10)+'px;"></div>'
    + '</div>'
    + '<div style="width:'+w+'px;height:'+baseH+'px;background:var(--s3);border:1.5px solid var(--border2);border-top:none;border-radius:0 0 4px 4px;position:relative;">'
    + '<div style="width:'+Math.round(w*0.3)+'px;height:'+(baseH-4)+'px;background:var(--border);border-radius:2px;position:absolute;top:2px;left:50%;transform:translateX(-50%);"></div>'
    + '</div></div>';
}

function thumbMonitor(w, h, color) {
  var screenH = Math.round(h * 0.8); var standH = h - screenH - 4; var footW = Math.round(w*0.5);
  return '<div style="display:flex;flex-direction:column;align-items:center;margin:0 auto 4px;">'
    + '<div style="width:'+w+'px;background:var(--s3);border:1.5px solid var(--border2);border-radius:5px 5px 0 0;">'
    + '<div style="height:9px;background:var(--s1);border-radius:5px 5px 0 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:3px;padding:0 5px;">'
    + '<div style="width:4px;height:4px;border-radius:50%;background:#ff5f57;"></div>'
    + '<div style="width:4px;height:4px;border-radius:50%;background:#febc2e;"></div>'
    + '<div style="width:4px;height:4px;border-radius:50%;background:#28c840;"></div>'
    + '</div>'
    + '<div style="height:'+(screenH-9)+'px;background:#1a1a2e;margin:0 4px;"></div>'
    + '</div>'
    + '<div style="width:'+Math.round(w*0.15)+'px;height:'+standH+'px;background:var(--s3);border:1.5px solid var(--border2);border-top:none;"></div>'
    + '<div style="width:'+footW+'px;height:4px;background:var(--s3);border:1.5px solid var(--border2);border-radius:3px;"></div>'
    + '</div>';
}

function thumbTV(w, h, color) {
  var screenH = Math.round(h * 0.78);
  return '<div style="display:flex;flex-direction:column;align-items:center;margin:0 auto 4px;">'
    + '<div style="width:'+w+'px;background:var(--s3);border:2px solid var(--border2);border-radius:6px;padding:4px;">'
    + '<div style="height:'+screenH+'px;background:#1a1a2e;border-radius:3px;display:flex;align-items:center;justify-content:center;">'
    + '<div style="font-size:9px;color:var(--muted);">📺</div>'
    + '</div></div>'
    + '<div style="width:'+Math.round(w*0.12)+'px;height:'+(h-screenH-12)+'px;background:var(--s3);border:1.5px solid var(--border2);border-top:none;"></div>'
    + '<div style="width:'+Math.round(w*0.5)+'px;height:4px;background:var(--s3);border:1.5px solid var(--border2);border-radius:3px;"></div>'
    + '</div>';
}

function thumbWatch(w, h, color) {
  var br = Math.round(w * 0.25);
  return '<div style="display:flex;flex-direction:column;align-items:center;margin:0 auto 4px;">'
    + '<div style="width:'+Math.round(w*0.6)+'px;height:10px;background:var(--s3);border-radius:3px 3px 0 0;"></div>'
    + '<div style="width:'+w+'px;height:'+h+'px;background:var(--s3);border:1.5px solid var(--border2);border-radius:'+br+'px;display:flex;align-items:center;justify-content:center;position:relative;">'
    + '<div style="width:'+(w-8)+'px;height:'+(h-8)+'px;background:#1a1a2e;border-radius:'+(br-4)+'px;"></div>'
    + '<div style="width:5px;height:14px;background:var(--border2);border-radius:2px;position:absolute;right:-4px;top:20%;"></div>'
    + '</div>'
    + '<div style="width:'+Math.round(w*0.6)+'px;height:10px;background:var(--s3);border-radius:0 0 3px 3px;"></div>'
    + '</div>';
}

// ═══════════════════════════════════════════════
// FULL FRAMES (with iframe)
// ═══════════════════════════════════════════════
function buildFrame(d, type, w, h, sc, withIframe) {
  if (type === 'phone') return buildPhone(d, w, h, sc, withIframe);
  if (type === 'tablet') return buildTablet(d, w, h, sc, withIframe);
  if (type === 'laptop') return buildLaptop(d, w, h, sc, withIframe);
  if (type === 'monitor') return buildMonitor(d, w, h, sc, withIframe);
  if (type === 'tv') return buildTV(d, w, h, sc, withIframe);
  if (type === 'watch') return buildWatch(d, w, h, sc, withIframe);
  return buildPhone(d, w, h, sc, withIframe);
}

function makeIframe(w, h, sc) {
  var sw = Math.round(w * sc), sh = Math.round(h * sc);
  var wrap = document.createElement('div');
  wrap.style.cssText = 'width:' + sw + 'px;height:' + sh + 'px;overflow:hidden;background:#fff;position:relative;flex-shrink:0;';

  if (!state.loaded) {
    wrap.style.background = 'var(--s2)';
    wrap.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:8px;"><div style="font-size:30px;opacity:.2;">🌐</div><div style="font-size:9px;font-family:var(--mono);color:var(--muted);letter-spacing:1px;">Enter URL above</div></div>';
    return wrap;
  }

  var loader = document.createElement('div');
  loader.className = 'loading-overlay';
  loader.innerHTML = '<div class="spin"></div>';
  wrap.appendChild(loader);

  var iframe = document.createElement('iframe');
  iframe.src = state.url;
  iframe.sandbox = 'allow-scripts allow-same-origin allow-forms allow-popups';
  iframe.style.cssText = 'width:' + w + 'px;height:' + h + 'px;transform:scale(' + sc + ');transform-origin:top left;border:none;display:block;';
  iframe.onload = function() { if (loader.parentNode) loader.parentNode.removeChild(loader); };
  wrap.appendChild(iframe);
  return wrap;
}

function buildPhone(d, w, h, sc, wi) {
  var sw = Math.round(w * sc), sh = Math.round(h * sc);
  var br = Math.round(Math.min(w, 48) * 0.45 * sc);
  var padV = Math.round(30 * sc), padH = Math.round(10 * sc);
  var notchW = Math.round(120 * sc), notchH = Math.round(30 * sc);
  var islandW = Math.round(90 * sc), islandH = Math.round(14 * sc);
  var isNew = w >= 390;

  var shell = document.createElement('div');
  shell.style.cssText = 'background:var(--s2);border:2px solid var(--border2);border-radius:' + br + 'px;padding:' + padV + 'px ' + padH + 'px;position:relative;display:flex;align-items:center;justify-content:center;flex-shrink:0;';

  if (isNew) {
    var island = document.createElement('div');
    island.style.cssText = 'width:' + islandW + 'px;height:' + islandH + 'px;background:var(--s1);border-radius:' + Math.round(islandH/2) + 'px;position:absolute;top:' + Math.round(12*sc) + 'px;left:50%;transform:translateX(-50%);';
    shell.appendChild(island);
  } else {
    var notch = document.createElement('div');
    notch.style.cssText = 'width:' + notchW + 'px;height:' + notchH + 'px;background:var(--s1);border-radius:0 0 ' + Math.round(14*sc) + 'px ' + Math.round(14*sc) + 'px;position:absolute;top:0;left:50%;transform:translateX(-50%);';
    shell.appendChild(notch);
  }

  // Buttons
  ['left:-3px;top:' + Math.round(80*sc) + 'px;width:3px;height:' + Math.round(28*sc) + 'px;',
   'left:-3px;top:' + Math.round(118*sc) + 'px;width:3px;height:' + Math.round(28*sc) + 'px;',
   'right:-3px;top:' + Math.round(100*sc) + 'px;width:3px;height:' + Math.round(40*sc) + 'px;'
  ].forEach(function(css) {
    var b = document.createElement('div');
    b.style.cssText = 'background:var(--border2);border-radius:2px;position:absolute;' + css;
    shell.appendChild(b);
  });

  shell.appendChild(makeIframe(w, h, sc));

  var chin = document.createElement('div');
  chin.style.cssText = 'width:' + Math.round(80*sc) + 'px;height:4px;background:var(--border2);border-radius:3px;position:absolute;bottom:' + Math.round(10*sc) + 'px;left:50%;transform:translateX(-50%);';
  shell.appendChild(chin);

  return shell;
}

function buildTablet(d, w, h, sc, wi) {
  var padV = Math.round(22 * sc), padH = Math.round(16 * sc);
  var br = Math.round(16 * sc);
  var camS = Math.round(8 * sc);

  var shell = document.createElement('div');
  shell.style.cssText = 'background:var(--s2);border:2.5px solid var(--border2);border-radius:' + br + 'px;padding:' + padV + 'px ' + padH + 'px;position:relative;flex-shrink:0;';

  var cam = document.createElement('div');
  cam.style.cssText = 'width:' + camS + 'px;height:' + camS + 'px;background:var(--border2);border-radius:50%;position:absolute;top:' + Math.round(8*sc) + 'px;left:50%;transform:translateX(-50%);';
  shell.appendChild(cam);

  shell.appendChild(makeIframe(w, h, sc));

  var hbar = document.createElement('div');
  hbar.style.cssText = 'width:' + Math.round(70*sc) + 'px;height:4px;background:var(--border2);border-radius:3px;position:absolute;bottom:' + Math.round(8*sc) + 'px;left:50%;transform:translateX(-50%);';
  shell.appendChild(hbar);

  return shell;
}

function buildLaptop(d, w, h, sc, wi) {
  var p = Math.round(8 * sc), bh = Math.round(26 * sc), br = Math.round(10 * sc);

  var outer = document.createElement('div');
  outer.style.cssText = 'display:flex;flex-direction:column;align-items:center;flex-shrink:0;';

  var lid = document.createElement('div');
  lid.style.cssText = 'background:var(--s2);border:1.5px solid var(--border2);border-radius:' + br + 'px ' + br + 'px 0 0;padding:' + p + 'px ' + p + 'px 0;';

  var bar = document.createElement('div');
  bar.style.cssText = 'height:' + bh + 'px;background:var(--s1);border-radius:' + (br-1) + 'px ' + (br-1) + 'px 0 0;display:flex;align-items:center;gap:5px;padding:0 8px;border-bottom:1px solid var(--border);margin:-' + p + 'px -' + p + 'px ' + Math.round(6*sc) + 'px;';
  bar.innerHTML = '<div class="dot dr" style="width:8px;height:8px"></div><div class="dot dy" style="width:8px;height:8px"></div><div class="dot dg" style="width:8px;height:8px"></div>'
    + '<div style="flex:1;background:var(--s2);border-radius:3px;height:14px;display:flex;align-items:center;padding:0 5px;font-family:var(--mono);font-size:8px;color:var(--muted);overflow:hidden;white-space:nowrap;margin:0 4px;">' + (state.url || 'about:blank') + '</div>';
  lid.appendChild(bar);
  lid.appendChild(makeIframe(w, h, sc));
  outer.appendChild(lid);

  var base = document.createElement('div');
  base.style.cssText = 'background:var(--s2);border:1.5px solid var(--border2);border-top:none;border-radius:0 0 6px 6px;height:' + Math.round(18*sc) + 'px;width:' + (Math.round(w*sc) + p*2) + 'px;position:relative;';
  var tp = document.createElement('div');
  tp.style.cssText = 'width:' + Math.round(60*sc) + 'px;height:' + Math.round(10*sc) + 'px;background:var(--s1);border:1px solid var(--border);border-radius:3px;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);';
  base.appendChild(tp);
  outer.appendChild(base);

  return outer;
}

function buildMonitor(d, w, h, sc, wi) {
  var p = Math.round(8 * sc), bh = Math.round(26 * sc);
  var standW = Math.round(80 * sc), standH = Math.round(22 * sc);
  var footW = Math.round(160 * sc), footH = Math.round(10 * sc);

  var outer = document.createElement('div');
  outer.style.cssText = 'display:flex;flex-direction:column;align-items:center;flex-shrink:0;';

  var shell = document.createElement('div');
  shell.style.cssText = 'background:var(--s2);border:2px solid var(--border2);border-radius:10px 10px 0 0;padding:' + p + 'px ' + p + 'px 0;';

  var bar = document.createElement('div');
  bar.style.cssText = 'height:' + bh + 'px;background:var(--s1);border-radius:9px 9px 0 0;display:flex;align-items:center;gap:5px;padding:0 8px;border-bottom:1px solid var(--border);margin:-' + p + 'px -' + p + 'px ' + Math.round(6*sc) + 'px;';
  bar.innerHTML = '<div class="dot dr" style="width:9px;height:9px"></div><div class="dot dy" style="width:9px;height:9px"></div><div class="dot dg" style="width:9px;height:9px"></div>'
    + '<div style="flex:1;background:var(--s2);border-radius:3px;height:15px;display:flex;align-items:center;padding:0 6px;font-family:var(--mono);font-size:8px;color:var(--muted);overflow:hidden;white-space:nowrap;margin:0 4px;">' + (state.url || 'about:blank') + '</div>';
  shell.appendChild(bar);
  shell.appendChild(makeIframe(w, h, sc));
  outer.appendChild(shell);

  var stand = document.createElement('div');
  stand.style.cssText = 'width:' + standW + 'px;height:' + standH + 'px;background:var(--s2);border:2px solid var(--border2);border-top:none;border-radius:0 0 4px 4px;';
  outer.appendChild(stand);
  var foot = document.createElement('div');
  foot.style.cssText = 'width:' + footW + 'px;height:' + footH + 'px;background:var(--s2);border:2px solid var(--border2);border-radius:4px;';
  outer.appendChild(foot);

  return outer;
}

function buildTV(d, w, h, sc, wi) {
  var p = Math.round(10 * sc);
  var standW = Math.round(80 * sc), standH = Math.round(20 * sc);
  var footW = Math.round(200 * sc);

  var outer = document.createElement('div');
  outer.style.cssText = 'display:flex;flex-direction:column;align-items:center;flex-shrink:0;';

  var shell = document.createElement('div');
  shell.style.cssText = 'background:var(--s2);border:3px solid var(--border2);border-radius:12px;padding:' + p + 'px;';
  shell.appendChild(makeIframe(w, h, sc));
  outer.appendChild(shell);

  var stand = document.createElement('div');
  stand.style.cssText = 'width:' + standW + 'px;height:' + standH + 'px;background:var(--s2);border:2px solid var(--border2);border-top:none;border-radius:0 0 4px 4px;';
  outer.appendChild(stand);
  var foot = document.createElement('div');
  foot.style.cssText = 'width:' + footW + 'px;height:' + Math.round(8*sc) + 'px;background:var(--s2);border:2px solid var(--border2);border-radius:4px;';
  outer.appendChild(foot);

  return outer;
}

function buildWatch(d, w, h, sc, wi) {
  var sw = Math.round(w * sc), sh = Math.round(h * sc);
  var br = Math.round(Math.min(sw, sh) * 0.26);
  var bandW = Math.round(sw * 0.75), bandH = Math.round(sh * 0.28);

  var outer = document.createElement('div');
  outer.style.cssText = 'display:flex;flex-direction:column;align-items:center;flex-shrink:0;';

  var bandTop = document.createElement('div');
  bandTop.style.cssText = 'width:' + bandW + 'px;height:' + bandH + 'px;background:var(--s3);border-radius:4px 4px 0 0;border:1.5px solid var(--border2);border-bottom:none;';
  outer.appendChild(bandTop);

  var shell = document.createElement('div');
  shell.style.cssText = 'background:var(--s2);border:2px solid var(--border2);border-radius:' + br + 'px;padding:' + Math.round(5*sc) + 'px;position:relative;';

  var crown = document.createElement('div');
  crown.style.cssText = 'width:' + Math.round(5*sc) + 'px;height:' + Math.round(18*sc) + 'px;background:var(--border2);border-radius:3px;position:absolute;right:-4px;top:25%;';
  shell.appendChild(crown);

  var iframeWrap = makeIframe(w, h, sc);
  iframeWrap.style.borderRadius = br + 'px';
  shell.appendChild(iframeWrap);
  outer.appendChild(shell);

  var bandBot = document.createElement('div');
  bandBot.style.cssText = 'width:' + bandW + 'px;height:' + bandH + 'px;background:var(--s3);border-radius:0 0 4px 4px;border:1.5px solid var(--border2);border-top:none;';
  outer.appendChild(bandBot);

  return outer;
}

renderMain();
