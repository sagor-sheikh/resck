<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ResponsiView — Responsive Design Tester</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3e;
    --accent: #00f5a0;
    --accent2: #7b61ff;
    --accent3: #ff6b6b;
    --text: #e8e8f0;
    --muted: #5a5a7a;
    --mono: 'Space Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 28px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    gap: 16px;
    flex-shrink: 0;
    z-index: 100;
  }

  .logo {
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.5px;
    white-space: nowrap;
  }
  .logo span { color: var(--accent); }

  .url-bar {
    flex: 1;
    display: flex;
    gap: 10px;
    max-width: 680px;
  }

  .url-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  .url-input:focus { border-color: var(--accent); }
  .url-input::placeholder { color: var(--muted); }

  .load-btn {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 10px 22px;
    font-family: var(--sans);
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .load-btn:hover { background: #00d488; transform: translateY(-1px); }
  .load-btn:active { transform: translateY(0); }

  .device-tabs {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .tab {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 8px 14px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .tab:hover { border-color: var(--accent2); color: var(--text); }
  .tab.active {
    background: var(--accent2);
    border-color: var(--accent2);
    color: #fff;
  }
  .tab svg { flex-shrink: 0; }

  .tab-all {
    border-color: var(--accent);
    color: var(--accent);
    font-size: 12px;
  }
  .tab-all.active { background: var(--accent); color: #000; border-color: var(--accent); }
  .tab-all:hover { background: rgba(0,245,160,0.1); }

  /* MAIN CANVAS */
  .canvas {
    flex: 1;
    overflow: auto;
    padding: 24px;
    background: var(--bg);
    display: flex;
    align-items: flex-start;
    justify-content: center;
  }

  /* SINGLE VIEW */
  .single-view {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    animation: fadeUp 0.35s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .device-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .device-label .dim {
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 3px 10px;
    border-radius: 20px;
    color: var(--accent);
    font-size: 11px;
  }

  /* DEVICE FRAMES */
  .frame-wrap {
    position: relative;
  }

  /* Desktop */
  .frame-desktop .monitor-shell {
    background: var(--surface2);
    border: 2px solid var(--border);
    border-radius: 12px 12px 0 0;
    padding: 10px 10px 0;
    position: relative;
  }
  .frame-desktop .monitor-bar {
    height: 28px;
    background: var(--surface);
    border-radius: 6px 6px 0 0;
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 7px;
    margin: -10px -10px 8px;
    border-bottom: 1px solid var(--border);
  }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot.r { background: #ff5f57; }
  .dot.y { background: #febc2e; }
  .dot.g { background: #28c840; }
  .monitor-address {
    flex: 1;
    background: var(--surface2);
    border-radius: 4px;
    height: 16px;
    margin: 0 8px;
    display: flex;
    align-items: center;
    padding: 0 8px;
    font-family: var(--mono);
    font-size: 9px;
    color: var(--muted);
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
  }
  .monitor-stand {
    width: 80px;
    height: 20px;
    background: var(--surface2);
    border: 2px solid var(--border);
    border-top: none;
    margin: 0 auto;
    border-radius: 0 0 6px 6px;
  }
  .monitor-foot {
    width: 140px;
    height: 10px;
    background: var(--surface2);
    border: 2px solid var(--border);
    border-radius: 6px;
    margin: 0 auto;
  }

  /* Laptop */
  .frame-laptop .lid {
    background: var(--surface2);
    border: 2px solid var(--border);
    border-radius: 10px 10px 0 0;
    padding: 8px 8px 0;
  }
  .laptop-bar {
    height: 22px;
    background: var(--surface);
    border-radius: 5px 5px 0 0;
    display: flex;
    align-items: center;
    padding: 0 10px;
    gap: 6px;
    margin: -8px -8px 6px;
    border-bottom: 1px solid var(--border);
  }
  .laptop-bar .monitor-address {
    font-size: 8px;
  }
  .frame-laptop .base {
    background: var(--surface2);
    border: 2px solid var(--border);
    border-top: none;
    border-radius: 0 0 6px 6px;
    height: 18px;
    position: relative;
  }
  .trackpad {
    width: 60px;
    height: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 3px;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  /* Tablet */
  .frame-tablet .tablet-shell {
    background: var(--surface2);
    border: 3px solid var(--border);
    border-radius: 14px;
    padding: 18px 12px;
    position: relative;
  }
  .tablet-cam {
    width: 8px; height: 8px;
    background: var(--border);
    border-radius: 50%;
    position: absolute;
    top: 8px; left: 50%; transform: translateX(-50%);
  }
  .tablet-home {
    width: 32px; height: 32px;
    border: 2px solid var(--border);
    border-radius: 8px;
    position: absolute;
    bottom: -2px; left: 50%; transform: translateX(-50%) translateY(0);
    background: var(--surface);
  }

  /* Mobile */
  .frame-mobile .phone-shell {
    background: var(--surface2);
    border: 3px solid var(--border);
    border-radius: 30px;
    padding: 28px 8px;
    position: relative;
  }
  .phone-notch {
    width: 80px; height: 18px;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 0 0 14px 14px;
    position: absolute;
    top: 0; left: 50%; transform: translateX(-50%);
  }
  .phone-home-bar {
    width: 70px; height: 5px;
    background: var(--border);
    border-radius: 3px;
    position: absolute;
    bottom: 10px; left: 50%; transform: translateX(-50%);
  }
  .phone-vol {
    position: absolute;
    left: -5px; top: 70px;
    width: 4px; height: 30px;
    background: var(--border);
    border-radius: 2px;
  }
  .phone-vol2 {
    position: absolute;
    left: -5px; top: 115px;
    width: 4px; height: 30px;
    background: var(--border);
    border-radius: 2px;
  }
  .phone-power {
    position: absolute;
    right: -5px; top: 90px;
    width: 4px; height: 40px;
    background: var(--border);
    border-radius: 2px;
  }

  /* The iframe */
  .screen-iframe-wrap {
    overflow: hidden;
    background: #fff;
    position: relative;
  }
  .screen-iframe-wrap iframe {
    border: none;
    display: block;
    transform-origin: top left;
  }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    height: 100%;
    min-height: 300px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 1px;
    text-align: center;
  }
  .empty-state .big { font-size: 52px; opacity: 0.3; }

  /* ALL VIEW GRID */
  .all-view {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 24px;
    width: 100%;
    max-width: 1400px;
    animation: fadeUp 0.35s ease;
  }

  .all-view .device-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .card-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-dim {
    color: var(--accent);
    background: rgba(0,245,160,0.08);
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 10px;
  }

  /* STATUS BAR */
  .status-bar {
    padding: 8px 28px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 20px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    flex-shrink: 0;
  }
  .status-bar .s-item { display: flex; align-items: center; gap: 6px; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
  .status-dot.live { background: var(--accent); box-shadow: 0 0 6px var(--accent); animation: pulse 2s infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ROTATE HINT */
  .rotate-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 6px;
    padding: 5px 12px;
    font-family: var(--mono);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .rotate-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  /* ZOOM */
  .zoom-controls {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: auto;
  }
  .zoom-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 5px;
    width: 28px; height: 28px;
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .zoom-btn:hover { border-color: var(--accent); color: var(--accent); }
  .zoom-val {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    min-width: 40px;
    text-align: center;
  }

  /* Loading overlay */
  .loading-overlay {
    position: absolute;
    inset: 0;
    background: rgba(10,10,15,0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    border-radius: inherit;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  @media (max-width: 1100px) {
    .all-view { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Responsi<span>View</span></div>

  <div class="url-bar">
    <input type="text" class="url-input" id="urlInput" placeholder="https://example.com" value="https://example.com" />
    <button class="load-btn" onclick="loadURL()">▶ Load</button>
  </div>

  <div class="device-tabs">
    <button class="tab tab-all active" onclick="setView('all')" id="tab-all">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18M15 3v18M3 9h18M3 15h18"/></svg>
      All
    </button>
    <button class="tab" onclick="setView('desktop')" id="tab-desktop">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
      Desktop
    </button>
    <button class="tab" onclick="setView('laptop')" id="tab-laptop">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 20h20L18 7H6L4 20z"/><path d="M6 7V4h12v3"/></svg>
      Laptop
    </button>
    <button class="tab" onclick="setView('tablet')" id="tab-tablet">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><circle cx="12" cy="17" r="1" fill="currentColor"/></svg>
      Tablet
    </button>
    <button class="tab" onclick="setView('mobile')" id="tab-mobile">
      <svg width="12" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><path d="M12 18h.01"/></svg>
      Mobile
    </button>
  </div>
</header>

<div class="canvas" id="canvas">
  <!-- injected by JS -->
</div>

<div class="status-bar">
  <div class="s-item"><div class="status-dot" id="statusDot"></div><span id="statusText">Enter a URL to preview</span></div>
  <div class="s-item" id="currentDim" style="display:none">📐 <span id="dimText"></span></div>
  <div class="zoom-controls" id="zoomControls" style="display:none">
    <button class="zoom-btn" onclick="adjustZoom(-10)">−</button>
    <span class="zoom-val" id="zoomVal">75%</span>
    <button class="zoom-btn" onclick="adjustZoom(10)">+</button>
  </div>
</div>

<script>
const DEVICES = {
  desktop: { label: 'Desktop', width: 1440, height: 900, icon: '🖥️' },
  laptop:  { label: 'Laptop',  width: 1280, height: 800, icon: '💻' },
  tablet:  { label: 'Tablet',  width: 768,  height: 1024, icon: '📱' },
  mobile:  { label: 'Mobile',  width: 390,  height: 844, icon: '📱' }
};

let currentView = 'all';
let currentURL = '';
let rotated = {};
let zoom = 75;
let loaded = false;

// Auto-fit scales for all-view
const ALL_SCALES = {
  desktop: 0.22,
  laptop:  0.25,
  tablet:  0.35,
  mobile:  0.45
};

// Single view scales
const SINGLE_SCALES = {
  desktop: 0.6,
  laptop:  0.65,
  tablet:  0.75,
  mobile:  0.85
};

function loadURL() {
  let url = document.getElementById('urlInput').value.trim();
  if (!url) return;
  if (!url.startsWith('http')) url = 'https://' + url;
  document.getElementById('urlInput').value = url;
  currentURL = url;
  loaded = true;
  setStatus('live', 'Loading → ' + url);
  renderView();
}

function setView(v) {
  currentView = v;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + v).classList.add('active');

  const showZoom = (v !== 'all');
  document.getElementById('zoomControls').style.display = showZoom ? 'flex' : 'none';
  document.getElementById('currentDim').style.display = (v !== 'all') ? 'flex' : 'none';

  if (v !== 'all') {
    const d = DEVICES[v];
    document.getElementById('dimText').textContent = d.width + ' × ' + d.height + 'px';
  }

  renderView();
}

function adjustZoom(delta) {
  zoom = Math.max(30, Math.min(100, zoom + delta));
  document.getElementById('zoomVal').textContent = zoom + '%';
  renderView();
}

function setStatus(state, msg) {
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  dot.className = 'status-dot' + (state === 'live' ? ' live' : '');
  txt.textContent = msg;
}

function renderView() {
  const canvas = document.getElementById('canvas');
  if (currentView === 'all') {
    canvas.innerHTML = renderAllView();
  } else {
    canvas.innerHTML = renderSingleView(currentView);
  }
  if (loaded) injectIframes();
}

function renderAllView() {
  return `<div class="all-view">
    ${Object.entries(DEVICES).map(([key, d]) => {
      const scale = ALL_SCALES[key];
      const w = d.width, h = rotated[key] ? d.width : d.height;
      const aw = rotated[key] ? d.height : d.width;
      return `
      <div class="device-card">
        <div class="card-label">
          ${d.label}
          <span class="card-dim">${aw} × ${h}px</span>
        </div>
        ${renderDeviceFrame(key, d, scale, true)}
      </div>`;
    }).join('')}
  </div>`;
}

function renderSingleView(key) {
  const d = DEVICES[key];
  const scale = zoom / 100;
  const w = rotated[key] ? d.height : d.width;
  const h = rotated[key] ? d.width : d.height;
  return `<div class="single-view">
    <div class="device-label">
      ${d.label}
      <span class="dim">${w} × ${h}px</span>
      ${key !== 'desktop' ? `<button class="rotate-btn" onclick="toggleRotate('${key}')">⟳ Rotate</button>` : ''}
    </div>
    ${renderDeviceFrame(key, d, scale, false)}
  </div>`;
}

function toggleRotate(key) {
  rotated[key] = !rotated[key];
  const d = DEVICES[key];
  const w = rotated[key] ? d.height : d.width;
  const h = rotated[key] ? d.width : d.height;
  document.getElementById('dimText').textContent = w + ' × ' + h + 'px';
  renderView();
  if (loaded) injectIframes();
}

function renderDeviceFrame(key, d, scale, mini) {
  const iw = rotated[key] ? d.height : d.width;
  const ih = rotated[key] ? d.width : d.height;
  const sw = Math.round(iw * scale);
  const sh = Math.round(ih * scale);

  if (key === 'desktop') return renderDesktop(d, iw, ih, sw, sh, scale);
  if (key === 'laptop')  return renderLaptop(d, iw, ih, sw, sh, scale);
  if (key === 'tablet')  return renderTablet(d, iw, ih, sw, sh, scale);
  if (key === 'mobile')  return renderMobile(d, iw, ih, sw, sh, scale);
}

function iframeHTML(key, iw, ih, sw, sh, scale) {
  const content = loaded
    ? `<div class="loading-overlay"><div class="spinner"></div></div>
       <iframe data-src="${currentURL}" data-key="${key}" data-iw="${iw}" data-ih="${ih}" data-scale="${scale}"
         style="width:${iw}px;height:${ih}px;transform:scale(${scale});transform-origin:top left;"
         sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>`
    : `<div class="empty-state"><div class="big">🌐</div>Enter a URL above to preview</div>`;
  return `<div class="screen-iframe-wrap" style="width:${sw}px;height:${sh}px;border-radius:4px;">${content}</div>`;
}

function renderDesktop(d, iw, ih, sw, sh, scale) {
  const barH = Math.round(28 * scale);
  return `<div class="frame-desktop frame-wrap">
    <div class="monitor-shell" style="padding:${Math.round(10*scale)}px ${Math.round(10*scale)}px 0;">
      <div class="monitor-bar" style="height:${barH}px;margin:${-Math.round(10*scale)}px ${-Math.round(10*scale)}px ${Math.round(8*scale)}px;">
        <div class="dot r"></div><div class="dot y"></div><div class="dot g"></div>
        <div class="monitor-address">${currentURL || 'about:blank'}</div>
      </div>
      ${iframeHTML('desktop', iw, ih, sw, sh, scale)}
    </div>
    <div class="monitor-stand" style="width:${Math.round(80*scale)}px;height:${Math.round(20*scale)}px;"></div>
    <div class="monitor-foot" style="width:${Math.round(140*scale)}px;height:${Math.round(10*scale)}px;"></div>
  </div>`;
}

function renderLaptop(d, iw, ih, sw, sh, scale) {
  return `<div class="frame-laptop frame-wrap">
    <div class="lid" style="padding:${Math.round(8*scale)}px ${Math.round(8*scale)}px 0;border-radius:${Math.round(10*scale)}px ${Math.round(10*scale)}px 0 0;">
      <div class="laptop-bar" style="height:${Math.round(22*scale)}px;margin:${-Math.round(8*scale)}px ${-Math.round(8*scale)}px ${Math.round(6*scale)}px;">
        <div class="dot r" style="width:7px;height:7px;"></div>
        <div class="dot y" style="width:7px;height:7px;"></div>
        <div class="dot g" style="width:7px;height:7px;"></div>
        <div class="monitor-address">${currentURL || 'about:blank'}</div>
      </div>
      ${iframeHTML('laptop', iw, ih, sw, sh, scale)}
    </div>
    <div class="base" style="height:${Math.round(18*scale)}px;">
      <div class="trackpad" style="width:${Math.round(60*scale)}px;height:${Math.round(10*scale)}px;"></div>
    </div>
  </div>`;
}

function renderTablet(d, iw, ih, sw, sh, scale) {
  const pad = Math.round(18 * scale);
  const camH = Math.round(8 * scale);
  return `<div class="frame-tablet frame-wrap">
    <div class="tablet-shell" style="padding:${pad}px ${Math.round(12*scale)}px;border-radius:${Math.round(14*scale)}px;border-width:${Math.max(2,Math.round(3*scale))}px;">
      <div class="tablet-cam" style="width:${camH}px;height:${camH}px;top:${Math.round(8*scale)}px;"></div>
      ${iframeHTML('tablet', iw, ih, sw, sh, scale)}
      <div class="tablet-home" style="width:${Math.round(32*scale)}px;height:${Math.round(32*scale)}px;bottom:${Math.round(6*scale)}px;border-radius:${Math.round(8*scale)}px;"></div>
    </div>
  </div>`;
}

function renderMobile(d, iw, ih, sw, sh, scale) {
  const pad = Math.round(28 * scale);
  const notchW = Math.round(80 * scale);
  const notchH = Math.round(18 * scale);
  return `<div class="frame-mobile frame-wrap">
    <div class="phone-shell" style="padding:${pad}px ${Math.round(8*scale)}px;border-radius:${Math.round(30*scale)}px;border-width:${Math.max(2,Math.round(3*scale))}px;">
      <div class="phone-notch" style="width:${notchW}px;height:${notchH}px;border-radius:0 0 ${Math.round(14*scale)}px ${Math.round(14*scale)}px;"></div>
      <div class="phone-vol" style="top:${Math.round(70*scale)}px;height:${Math.round(30*scale)}px;"></div>
      <div class="phone-vol2" style="top:${Math.round(115*scale)}px;height:${Math.round(30*scale)}px;"></div>
      <div class="phone-power" style="top:${Math.round(90*scale)}px;height:${Math.round(40*scale)}px;"></div>
      ${iframeHTML('mobile', iw, ih, sw, sh, scale)}
      <div class="phone-home-bar" style="width:${Math.round(70*scale)}px;bottom:${Math.round(10*scale)}px;"></div>
    </div>
  </div>`;
}

function injectIframes() {
  document.querySelectorAll('iframe[data-src]').forEach(iframe => {
    const overlay = iframe.previousElementSibling;
    iframe.onload = () => {
      if (overlay && overlay.classList.contains('loading-overlay')) {
        overlay.style.opacity = '0';
        setTimeout(() => overlay.remove(), 400);
      }
      setStatus('live', 'Loaded: ' + currentURL);
    };
    iframe.onerror = () => {
      setStatus('', 'Could not load — check CORS or use a different URL');
    };
    iframe.src = iframe.dataset.src;
    iframe.removeAttribute('data-src');
  });
}

// Enter key
document.getElementById('urlInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') loadURL();
});

// Initial render (empty state)
renderView();
setView('all');
</script>
</body>
</html>
